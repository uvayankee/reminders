name: Android CI

on:
  push:
    branches: [ "main", "alarm-mvp" ]
  pull_request:
    branches: [ "main", "alarm-mvp" ]

jobs:
  checks:
    name: Lint & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run Lint & Tests
        run: ./gradlew lintRelease test --no-daemon

  build-release:
    name: Build Release APK
    runs-on: ubuntu-latest
    needs: checks
    # Only run the release build on pushes (merges) to the main branch
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build Release APK
        # This will use the GITHUB_RUN_NUMBER automatically due to our build.gradle.kts config
        run: ./gradlew assembleRelease --no-daemon

      # -------------------------------------------------------------------------
      # FUTURE: Build App Bundle (AAB) for Google Play Store
      # -------------------------------------------------------------------------
      # - name: Build App Bundle (AAB)
      #   run: ./gradlew bundleRelease --no-daemon
      # -------------------------------------------------------------------------

      # -------------------------------------------------------------------------
      # FUTURE: App Signing
      # Once you are ready to sign the app for production (or a store), you will:
      # 1. Generate a keystore (.jks) file locally.
      # 2. Base64 encode it and add it to GitHub Secrets as SIGNING_KEY.
      # 3. Add KEY_ALIAS, KEY_STORE_PASSWORD, and KEY_PASSWORD to GitHub Secrets.
      # 4. Uncomment the step below.
      # -------------------------------------------------------------------------
      # - name: Sign Release APK
      #   id: sign_app
      #   uses: r0adkll/sign-android-release@v1
      #   with:
      #     releaseDirectory: app/build/outputs/apk/release
      #     signingKeyBase64: ${{ secrets.SIGNING_KEY }}
      #     alias: ${{ secrets.KEY_ALIAS }}
      #     keyStorePassword: ${{ secrets.KEY_STORE_PASSWORD }}
      #     keyPassword: ${{ secrets.KEY_PASSWORD }}
      #   env:
      #     BUILD_TOOLS_VERSION: "34.0.0"
      # -------------------------------------------------------------------------

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release-v1.0.${{ github.run_number }}
          # Expose the unsigned APK for now. 
          # When you enable signing above, change this path to: ${{steps.sign_app.outputs.signedReleaseFile}}
          path: app/build/outputs/apk/release/app-release-unsigned.apk
