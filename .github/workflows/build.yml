name: Android CI

on:
  push:
    branches: [ "main", "alarm-mvp" ]
  pull_request:
    branches: [ "main", "alarm-mvp" ]

jobs:
  checks:
    name: Lint & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Run Lint
        run: ./gradlew lintRelease

      - name: Run Tests
        run: ./gradlew test

  build-release:
    name: Build Release APK
    runs-on: ubuntu-latest
    needs: checks
    # Only run the release build on pushes (merges) to the main branch
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write # Required for creating a GitHub Release
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build Release APK
        # This will use the GITHUB_RUN_NUMBER automatically due to our build.gradle.kts config
        run: ./gradlew assembleRelease

      - name: Create GitHub Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: Release v1.0.${{ github.run_number }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: app/build/outputs/apk/release/app-release.apk

      - name: Upload Release APK as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-v1.0.${{ github.run_number }}
          path: app/build/outputs/apk/release/app-release.apk
